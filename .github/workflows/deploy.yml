name: Deploy Next App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm


      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        
      - name: Restart app
        run: |
          pm2 restart shopify-order-front 
